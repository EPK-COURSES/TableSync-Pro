@startuml
title Table State Diagram - TableSync Pro

skinparam state {
    BackgroundColor LightCyan
    BorderColor RoyalBlue
    ArrowColor DimGray
    ArrowThickness 2
    FontName Arial
}

[*] -down-> Available : System Initialization

Available -down-> Reserved : Reservation saved
Available -right-> Occupied : Walk-in customers seated

Reserved -left-> Available : Reservation cancelled
Reserved -down-> Occupied : Waiter marks table as occupied

Occupied -up-> Available : Invoice generated\n& Table cleared

@enduml

