@startuml
title Reservation State Diagram - TableSync Pro

skinparam state {
    BackgroundColor Honeydew
    BorderColor SeaGreen
    ArrowColor DimGray
    ArrowThickness 2
    FontName Arial
}

[*] -down-> Confirmed : Request to create\nreservation

state Confirmed {
  Confirmed : entry / enter name, contact,\n date, time, table size
}

Confirmed -left-> Cancelled : User cancels\nupcoming reservation
Confirmed -right-> Completed : Customer arrives &\ntable marked occupied

Cancelled -down-> [*] : Reservation removed
Completed -down-> [*] : Dining session begins

@enduml

