@startuml
title Order State Diagram - TableSync Pro

skinparam state {
    BackgroundColor LightYellow
    BorderColor GoldenRod
    ArrowColor DimGray
    ArrowThickness 2
    FontName Arial
}

[*] -down-> Pending : User submits new order

state Pending {
  Pending : entry / save as pending & notify kitchen / waiters
}

Pending -left-> Cancelled : Customer/Waiter\ncancels order
Pending -down-> Preparing : Waiter updates\nstatus to preparing

Preparing -down-> Served : Waiter updates\nstatus to served

Served -down-> [*] : Ready for invoice\ngeneration
Cancelled -down-> [*] : Order removed\nfrom queue

@enduml

